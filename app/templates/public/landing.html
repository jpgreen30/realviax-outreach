<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ headline }}</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    header {
      text-align: center;
      margin-bottom: 30px;
    }
    h1 {
      font-size: 2.5rem;
      margin: 0 0 10px 0;
      font-weight: 700;
    }
    .subheadline {
      font-size: 1.2rem;
      opacity: 0.9;
      margin-bottom: 20px;
    }
    .video-container {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 */
      height: 0;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      margin-bottom: 30px;
    }
    .video-container video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .form-container {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 30px;
      max-width: 500px;
      margin: 0 auto;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
    }
    input[type="text"], input[type="email"] {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      background: rgba(255,255,255,0.95);
      color: #333;
    }
    input:focus {
      outline: 2px solid #4ade80;
    }
    .cta-button {
      width: 100%;
      background: #4ade80;
      color: #1a1a2e;
      font-weight: 700;
      font-size: 1.1rem;
      padding: 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .cta-button:hover {
      background: #22c55e;
    }
    .footer {
      text-align: center;
      margin-top: 40px;
      opacity: 0.7;
      font-size: 0.9rem;
    }
    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
      .container { padding: 20px 15px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>{{ headline }}</h1>
      <p class="subheadline">{{ subheadline }}</p>
    </header>

    <div class="video-container">
      <video controls autoplay muted playsinline>
        <source src="{{ teaser_video_url }}" type="video/mp4">
        Your browser does not support video.
      </video>
    </div>

    <div class="form-container">
      <form action="/api/submit-lead" method="post">
        <input type="hidden" name="landing_page_id" value="{{ landing_page_id }}">
        <div class="form-group">
          <label for="first_name">First Name</label>
          <input type="text" id="first_name" name="first_name" required>
        </div>
        <div class="form-group">
          <label for="last_name">Last Name</label>
          <input type="text" id="last_name" name="last_name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="phone">Phone (optional)</label>
          <input type="text" id="phone" name="phone">
        </div>
        <button type="submit" class="cta-button">Claim Your Free Teaser</button>
      </form>
    </div>

    <div class="footer">
      &copy; {{ year }} Realviax. All rights reserved.
    </div>
  </div>
</body>
</html>
